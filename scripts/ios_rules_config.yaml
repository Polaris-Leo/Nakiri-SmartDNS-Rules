# =========================
# iOS / SmartDNS rules config
# =========================

global:
  valid_types:
    - DOMAIN
    - DOMAIN-SUFFIX
    - DOMAIN-KEYWORD

rules:
  - name: bilibili
    source:
      url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/BiliBili/BiliBili.yaml
    output:
      file: ios_rules/bilibili.conf
      format: domain        # domain | smartdns (预留)
    enabled: true

  - name: baidu
    source:
      url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Baidu/Baidu.yaml
    output:
      file: ios_rules/baidu.conf
      format: domain
    enabled: true

  - name: private_tracker
    source:
      url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/PrivateTracker/PrivateTracker.yaml
    output:
      file: ios_rules/pt_domains.conf
      format: domain
    enabled: true

  - name: hoyoverse
    source:
      url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/HoYoverse/HoYoverse.yaml
    output:
      file: ios_rules/hoyoverse.conf
      format: domain
    enabled: true

  - name: microsoft
    source:
      url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Microsoft/Microsoft.yaml
    output:
      file: smartdns_domain_lists/Microsoft.conf
      format: smartdns_list
      display_name: Microsoft
    enabled: true

  - name: cloudflare
    source:
      url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Cloudflare/Cloudflare.yaml
    output:
      file: smartdns_domain_lists/Cloudflare.conf
      format: smartdns_list
      display_name: Cloudflare
    enabled: true

  - name: cloudflare_cn
    source:
      url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Cloudflarecn/Cloudflarecn.yaml
    output:
      file: smartdns_domain_lists/CloudflareCN.conf
      format: smartdns_list
      display_name: CloudflareCN
    enabled: true
